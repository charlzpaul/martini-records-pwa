<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8DAE74"/>
      <stop offset="100%" stop-color="#7D9D5D"/>
    </linearGradient>
  </defs>
  
  <!-- Glass Stem -->
  <line x1="256" y1="300" x2="256" y2="400" stroke="#1F2937" stroke-width="20" stroke-linecap="round"/>
  
  <!-- Glass Base -->
  <ellipse cx="256" cy="410" rx="124" ry="27" fill="#1F2937"/>
  
  <!-- Liquid (Equilateral Triangle with padding) -->
  <!-- Glass height: 220 units (100 to 320), Liquid height: 165 units (3/4 of glass) -->
  <!-- Side edges inline with glass edges: M 139,155 L 373,155 L 256,320 -->
  <path d="M 139,155 L 373,155 L 256,320 Z" fill="url(#liquidGradient)" opacity="0.9"/>
  
  <!-- Glass Body Outline (Equilateral Triangle with padding) -->
  <!-- Added substantial padding: x from 100 to 412, y from 100 to 320 -->
  <path d="M 100,100 L 412,100 L 256,320 Z" fill="none" stroke="#1F2937" stroke-width="16" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Olive -->
  <circle cx="282" cy="185" r="22" fill="#7D9D5D" stroke="#5C7A44" stroke-width="6"/>
  <circle cx="282" cy="185" r="7" fill="#E11D48"/> <!-- Pimento Red -->
  
  <!-- Glass Reflection -->
  <path d="M 160,115 L 230,115" fill="none" stroke="white" stroke-width="11" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Sparkles -->
  <g>
    <line x1="100" y1="100" x2="78" y2="65" stroke="#ED8917" stroke-width="8" stroke-linecap="round"/>
    <line x1="412" y1="100" x2="434" y2="65" stroke="#ED8917" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
