<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 135" width="90" height="135">
  <defs>
    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8DAE74"/>
      <stop offset="100%" stop-color="#7D9D5D"/>
    </linearGradient>
  </defs>
  
  <!-- Glass Stem -->
  <line x1="45" y1="79.5" x2="45" y2="120" stroke="#1F2937" stroke-width="3.75" stroke-linecap="round"/>
  
  <!-- Glass Base -->
  <ellipse cx="45" cy="123.75" rx="33.75" ry="7.5" fill="#1F2937"/>
  
  <!-- Liquid (Equilateral Triangle with padding) -->
  <!-- Glass height: 67.5 units (22.5 to 90), Liquid height: 50.625 units (3/4 of glass) -->
  <path d="M 24,39.375 L 66,39.375 L 45,90 Z" fill="url(#liquidGradient)" opacity="0.9"/>
  
  <!-- Glass Body Outline (Equilateral Triangle with padding) -->
  <!-- Added more padding: x from 16.5 to 73.5, y from 22.5 to 90 -->
  <path d="M 16.5,22.5 L 73.5,22.5 L 45,90 Z" fill="none" stroke="#1F2937" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Olive -->
  <circle cx="51" cy="56.25" r="6" fill="#7D9D5D" stroke="#5C7A44" stroke-width="1.125"/>
  <circle cx="51" cy="56.25" r="1.875" fill="#E11D48"/> <!-- Pimento Red -->
  
  <!-- Glass Reflection -->
  <path d="M 24,26.25 L 36,26.25" fill="none" stroke="white" stroke-width="2.25" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Sparkles -->
  <g>
    <line x1="16.5" y1="22.5" x2="12.75" y2="15" stroke="#ED8917" stroke-width="1.125" stroke-linecap="round"/>
    <line x1="73.5" y1="22.5" x2="77.25" y2="15" stroke="#ED8917" stroke-width="1.125" stroke-linecap="round"/>
  </g>
</svg>
