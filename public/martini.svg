<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <defs>
    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8DAE74"/>
      <stop offset="100%" stop-color="#7D9D5D"/>
    </linearGradient>
  </defs>
  
  <!-- Glass Stem -->
  <line x1="60" y1="106" x2="60" y2="160" stroke="#1F2937" stroke-width="5" stroke-linecap="round"/>
  
  <!-- Glass Base -->
  <ellipse cx="60" cy="165" rx="45" ry="10" fill="#1F2937"/>
  
  <!-- Liquid (Equilateral Triangle with padding) -->
  <!-- Glass height: 90 units (30 to 120), Liquid height: 67.5 units (3/4 of glass) -->
  <path d="M 32,52.5 L 88,52.5 L 60,120 Z" fill="url(#liquidGradient)" opacity="0.9"/>
  
  <!-- Glass Body Outline (Equilateral Triangle with padding) -->
  <!-- Added more padding: x from 22 to 98, y from 30 to 120 -->
  <path d="M 22,30 L 98,30 L 60,120 Z" fill="none" stroke="#1F2937" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Olive -->
  <circle cx="68" cy="75" r="8" fill="#7D9D5D" stroke="#5C7A44" stroke-width="1.5"/>
  <circle cx="68" cy="75" r="2.5" fill="#E11D48"/> <!-- Pimento Red -->
  
  <!-- Glass Reflection -->
  <path d="M 32,35 L 48,35" fill="none" stroke="white" stroke-width="3" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Sparkles -->
  <g>
    <line x1="22" y1="30" x2="17" y2="20" stroke="#ED8917" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="98" y1="30" x2="103" y2="20" stroke="#ED8917" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>
