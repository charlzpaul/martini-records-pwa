<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 180" width="120" height="180">
  <defs>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  
  <!-- Glass Stem -->
  <line x1="60" y1="120" x2="60" y2="160" stroke="#1F2937" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Glass Base -->
  <ellipse cx="60" cy="160" rx="30" ry="8" fill="#1F2937"/>
  
  <!-- Glass Body Outline -->
  <path d="M30 20 Q30 120 60 120 Q90 120 90 20 Z" fill="none" stroke="#1F2937" stroke-width="6" stroke-linecap="round"/>
  
  <!-- Liquid -->
  <path d="M35 35 Q35 110 60 110 Q85 110 85 35 Z" fill="url(#liquidGradient)" opacity="0.7"/>
  
  <!-- Olive -->
  <circle cx="60" cy="40" r="8" fill="#10B981" stroke="#047857" stroke-width="2"/>
  <circle cx="60" cy="40" r="3" fill="#065F46"/>
  
  <!-- Olive Twist -->
  <path d="M60 34 Q64 36 64 40" fill="none" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Glass Reflection -->
  <path d="M35 25 Q40 100 60 100 Q80 100 85 25" fill="none" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Sparkles -->
  <g>
    <line x1="30" y1="40" x2="30" y2="30" stroke="#F59E0B" stroke-width="2"/>
    <line x1="30" y1="40" x2="38" y2="32" stroke="#F59E0B" stroke-width="2"/>
    <line x1="90" y1="40" x2="90" y2="30" stroke="#F59E0B" stroke-width="2"/>
    <line x1="90" y1="40" x2="82" y2="32" stroke="#F59E0B" stroke-width="2"/>
  </g>
</svg>
