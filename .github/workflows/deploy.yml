name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Or master, depending on your default branch
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Use the Node.js version you're developing with

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
        # Optional: if you want to deploy to a specific branch, e.g., 'gh-pages'
        # publish_branch: gh-pages
        # Optional: if you want to keep history
        # keep_files: true
